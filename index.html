<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; border-radius: 20px; padding: 30px; margin-top: 50px; border: 1px solid #38bdf8; }
        h1 { color: #38bdf8; }
        .balance { font-size: 40px; color: #fbbf24; margin: 20px 0; }
        .btn { background: #38bdf8; border: none; padding: 15px 30px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h1>💎 Ads Money Bot</h1>
        <div class="balance"><span id="bal">0.00</span> TON</div>
        <button class="btn" onclick="showAd()">📺 СМОТРЕТЬ РЕКЛАМУ</button>
    </div>
    <script>
        let balance = 0;
        const AdController = window.Adsgram.init({ blockId: "int-2666" }); 
        function showAd() {
            AdController.show().then(() => {
                balance += 0.01;
                document.getElementById('bal').innerText = balance.toFixed(2);
                alert("Бонус зачислен!");
            }).catch(() => { alert("Реклама не загружена"); });
        }
    </script>
</body>
  </html>
