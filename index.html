<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FastAdsMoney</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script
    src="//libtl.com/sdk.js"
    data-zone="11082166"
    data-sdk="show_11082166">
</script>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:100%;
    max-width:400px;
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    text-align:center;
}

h1{
    margin:0;
    color:#38bdf8;
}

.reward{
    margin-top:20px;
    font-size:30px;
    font-weight:bold;
    color:#fbbf24;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#0ea5e9;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

#status{
    margin-top:15px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="card">

    <h1>💎 FastAdsMoney</h1>

    <p>Watch ads and earn TON</p>

    <div class="reward">
        +0.0005 TON
    </div>

    <p>User ID: <span id="uid">Loading...</span></p>

    <button id="watchBtn">
        📺 Watch Ad
    </button>

    <div id="status"></div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const params = new URLSearchParams(window.location.search);

const userId =
    params.get("user_id") ||
    tg.initDataUnsafe?.user?.id;

document.getElementById("uid").innerText =
    userId || "Unknown";

const btn = document.getElementById("watchBtn");
const statusBox = document.getElementById("status");

function setStatus(text){
    statusBox.innerText = text;
}

btn.onclick = async () => {

    if(!userId){
        setStatus("User ID not found");
        return;
    }

    if(typeof show_11082166 !== "function"){
        setStatus("Monetag not loaded");
        return;
    }

    btn.disabled = true;
    setStatus("Loading ad...");

    try{

        await show_11082166();

        await fetch(
            `/monetag_reward?user_id=${userId}`,
            {
                method:"POST"
            }
        );

        setStatus("🎉 Reward credited!");

    }catch(err){

        console.log(err);
        setStatus("Ad not available");

    }

    btn.disabled = false;
};

</script>

</body>
</html>
